name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pin-check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Pin check
        run: pnpm run pin:check

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Typecheck
        run: pnpm run typecheck

  lint-base:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: ESLint core
        run: pnpm run lint:base

  lint-sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: ESLint sonar
        run: pnpm run lint:sonar

  deps-cruise:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Dependency cruise
        run: pnpm run deps:cruise

  debt-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Debt guard
        run: pnpm run debt:guard

  structure-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Structure guard
        run: pnpm run structure:guard

  architecture-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Architecture guard
        run: pnpm run architecture:guard

  coverage-v8:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Coverage v8
        run: pnpm run coverage

  coverage-istanbul:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Coverage istanbul
        run: pnpm run coverage:istanbul
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-istanbul
          path: coverage-istanbul/coverage-final.json
          if-no-files-found: error
          retention-days: 1

  fallow:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [coverage-istanbul]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-istanbul
          path: coverage-istanbul
      - name: Fallow
        run: pnpm run fallow

  mutation-t0:
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Mutation T0
        run: pnpm run mutation:t0

  mutation-wide:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Mutation wide
        run: pnpm run mutation:wide

  # Keep Playwright isolated to this lane only.
  e2e-playwright:
    if: ${{ hashFiles('playwright.config.*') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (cache + integrity check)
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: E2E
        run: pnpm run e2e

  ci-pass:
    runs-on: ubuntu-latest
    needs:
      - pin-check
      - typecheck
      - lint-base
      - lint-sonar
      - deps-cruise
      - debt-guard
      - structure-guard
      - architecture-guard
      - coverage-v8
      - fallow
      - mutation-t0
      - mutation-wide
    timeout-minutes: 5
    steps:
      - name: CI pass
        run: echo "All required CI jobs passed."

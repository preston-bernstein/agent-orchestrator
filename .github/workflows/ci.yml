# Single job runs the same surface as locally: `pnpm run ci` (six checks in
# parallel on one runner via `concurrently`). For ordered logs use `pnpm run ci:seq`.
name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: pnpm run ci
        run: pnpm run ci
